name: Update Metrics

# Trigger on schedule (daily at midnight UTC)
on:
  schedule:
    # Runs daily at 00:00 UTC
    - cron: '0 0 * * *'
  # Allow manual trigger
  workflow_dispatch:

jobs:
  github-metrics:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v3

      # Generate metrics SVG
      - name: Generate GitHub Metrics
        uses: lowlighter/metrics@latest
        with:
          # GitHub token for API access
          token: ${{ secrets.GITHUB_TOKEN }}
          user: hynko431
          template: classic
          base: header, activity, community, repositories, metadata
          
          # Output settings
          output_action: commit
          output_action_token: ${{ secrets.GITHUB_TOKEN }}
          
          # Customization
          commit_message: 'update metrics.svg - daily metrics update'
          committer_name: 'github-actions[bot]'
          committer_email: 'github-actions[bot]@users.noreply.github.com'
          
          # Visual options
          config_timezone: Asia/Kolkata
          config_display: large
          
          # Languages
          plugins_languages: yes
          plugins_languages_colors: github
          plugins_languages_limit: 8
          
          # Achievements
          plugins_achievements: yes
          plugins_achievements_threshold: B
          
          # Calendar
          plugins_calendar: yes
          
          # Activity
          plugins_activity: yes
          plugins_activity_limit: 5
          plugins_activity_days: 14
          
          # Topics
          plugins_topics: yes
          plugins_topics_limit: 10
          
          # Star history
          plugins_stars: yes
          
          # Gists
          plugins_gists: yes
