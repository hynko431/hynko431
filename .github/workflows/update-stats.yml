name: Update GitHub Stats

on:
  schedule:
    - cron: "0 0 * * *"   # runs every day at midnight UTC
  push:
    branches: [main]
  workflow_dispatch:       # lets you trigger it manually from the Actions tab

jobs:
  build-stats:
    runs-on: ubuntu-latest
    permissions:
      contents: write      # needed to commit stats.json back to the repo

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Fetch stats from GitHub API
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          USERNAME: hynko431
        run: |
          # Write Python script to fetch all stats
          cat > fetch_stats.py << 'EOF'
          import sys
          import json
          import os
          import urllib.request
          from datetime import datetime
          
          TOKEN = os.environ['GH_TOKEN']
          USERNAME = os.environ['USERNAME']
          
          def github_api_request(query):
              """Make a GraphQL request to GitHub API."""
              body = json.dumps({"query": query}).encode()
              req = urllib.request.Request(
                  'https://api.github.com/graphql',
                  data=body,
                  headers={
                      'Authorization': f'Bearer {TOKEN}',
                      'Content-Type': 'application/json'
                  }
              )
              with urllib.request.urlopen(req) as r:
                  return json.load(r)
          
          # ── Total public repos ──────────────────────────────────────────
          print("Fetching repo count...", file=sys.stderr)
          resp = json.loads(urllib.request.urlopen(
              urllib.request.Request(
                  f'https://api.github.com/users/{USERNAME}',
                  headers={'Authorization': f'Bearer {TOKEN}'}
              )
          ).read().decode())
          repo_count = resp['public_repos']
          
          # ── Merged PRs (search API) ─────────────────────────────────────
          print("Fetching merged PRs count...", file=sys.stderr)
          resp = json.loads(urllib.request.urlopen(
              urllib.request.Request(
                  f'https://api.github.com/search/issues?q=author:{USERNAME}+type:pr+is:merged&per_page=1',
                  headers={'Authorization': f'Bearer {TOKEN}'}
              )
          ).read().decode())
          merged_prs = resp['total_count']
          
          # ── Contributions this year ─────────────────────────────────────
          print("Fetching contributions this year...", file=sys.stderr)
          year_query = f'''
          {{
              user(login: "{USERNAME}") {{
                  contributionsCollection {{
                      contributionCalendar {{
                          totalContributions
                      }}
                  }}
              }}
          }}
          '''
          resp = github_api_request(year_query)
          contributions_this_year = resp['data']['user']['contributionsCollection']['contributionCalendar']['totalContributions']
          
          # ── All-time contributions ──────────────────────────────────────
          print("Fetching contribution years...", file=sys.stderr)
          years_query = f'''
          {{
              user(login: "{USERNAME}") {{
                  contributionsCollection {{
                      contributionYears
                  }}
              }}
          }}
          '''
          resp = github_api_request(years_query)
          years = resp['data']['user']['contributionsCollection']['contributionYears']
          
          total_contributions = 0
          for year in years:
              print(f"Fetching contributions for {year}...", file=sys.stderr)
              year_contribution_query = f'''
              {{
                  user(login: "{USERNAME}") {{
                      contributionsCollection(
                          from: "{year}-01-01T00:00:00Z"
                          to: "{year}-12-31T23:59:59Z"
                      ) {{
                          contributionCalendar {{
                              totalContributions
                          }}
                      }}
                  }}
              }}
              '''
              resp = github_api_request(year_contribution_query)
              year_total = resp['data']['user']['contributionsCollection']['contributionCalendar']['totalContributions']
              total_contributions += year_total
          
          # ── Pull requests opened (all, not just merged) ─────────────────
          print("Fetching all pull requests opened...", file=sys.stderr)
          resp = json.loads(urllib.request.urlopen(
              urllib.request.Request(
                  f'https://api.github.com/search/issues?q=author:{USERNAME}+type:pr&per_page=1',
                  headers={'Authorization': f'Bearer {TOKEN}'}
              )
          ).read().decode())
          all_prs_opened = resp['total_count']
          
          # ── Pull requests reviewed ──────────────────────────────────────
          print("Fetching pull requests reviewed...", file=sys.stderr)
          review_query = f'''
          {{
              user(login: "{USERNAME}") {{
                  contributionsCollection {{
                      totalPullRequestReviews
                  }}
              }}
          }}
          '''
          resp = github_api_request(review_query)
          prs_reviewed = resp['data']['user']['contributionsCollection']['totalPullRequestReviews']
          
          # ── Issues opened ──────────────────────────────────────────────
          print("Fetching issues opened...", file=sys.stderr)
          resp = json.loads(urllib.request.urlopen(
              urllib.request.Request(
                  f'https://api.github.com/search/issues?q=author:{USERNAME}+type:issue&per_page=1',
                  headers={'Authorization': f'Bearer {TOKEN}'}
              )
          ).read().decode())
          issues_opened = resp['total_count']
          
          # ── Issues closed ──────────────────────────────────────────────
          print("Fetching issues closed...", file=sys.stderr)
          resp = json.loads(urllib.request.urlopen(
              urllib.request.Request(
                  f'https://api.github.com/search/issues?q=author:{USERNAME}+type:issue+is:closed&per_page=1',
                  headers={'Authorization': f'Bearer {TOKEN}'}
              )
          ).read().decode())
          issues_closed = resp['total_count']
          
          # ── Stars received across all repos ─────────────────────────────
          print("Fetching stars...", file=sys.stderr)
          resp = json.loads(urllib.request.urlopen(
              urllib.request.Request(
                  f'https://api.github.com/users/{USERNAME}/repos?per_page=100&type=owner',
                  headers={'Authorization': f'Bearer {TOKEN}'}
              )
          ).read().decode())
          stars = sum(r['stargazers_count'] for r in resp)
          
          # ── Write stats.json ────────────────────────────────────────────
          stats = {
              "total_contributions": total_contributions,
              "contributions_this_year": contributions_this_year,
              "pull_requests_opened": all_prs_opened,
              "pull_requests_merged": merged_prs,
              "pull_requests_reviewed": prs_reviewed,
              "issues_opened": issues_opened,
              "issues_closed": issues_closed,
              "repositories": repo_count,
              "stars": stars,
              "updated_at": datetime.utcnow().isoformat() + "Z"
          }
          
          with open('stats.json', 'w') as f:
              json.dump(stats, f, indent=2)
          
          print("Stats written:", file=sys.stderr)
          print(json.dumps(stats, indent=2))
          EOF
          
          python3 fetch_stats.py

      - name: Commit updated stats.json
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add stats.json
          # only commit if something actually changed
          git diff --cached --quiet || git commit -m "chore: update github stats [skip ci]"
          git push
