name: Update GitHub Stats

on:
  schedule:
    - cron: "0 0 * * *"   # runs every day at midnight UTC
  push:
    branches: [main]
  workflow_dispatch:       # lets you trigger it manually from the Actions tab

jobs:
  build-stats:
    runs-on: ubuntu-latest
    permissions:
      contents: write      # needed to commit stats.json back to the repo

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Fetch stats from GitHub API
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          USERNAME: hynko431
        run: |
          # ── Total public repos ──────────────────────────────────────────
          REPO_COUNT=$(curl -s -H "Authorization: Bearer $GH_TOKEN" \
            "https://api.github.com/users/$USERNAME" \
            | python3 -c "import sys,json; d=json.load(sys.stdin); print(d['public_repos'])")

          # ── Merged PRs (search API, up to 1000 results) ─────────────────
          MERGED_PRS=$(curl -s -H "Authorization: Bearer $GH_TOKEN" \
            "https://api.github.com/search/issues?q=author:$USERNAME+type:pr+is:merged&per_page=1" \
            | python3 -c "import sys,json; print(json.load(sys.stdin)['total_count'])")

          # ── Total commits via contributions calendar (GraphQL) ───────────
          YEAR=$(date +%Y)
          CONTRIBUTIONS=$(curl -s -H "Authorization: Bearer $GH_TOKEN" \
            -H "Content-Type: application/json" \
            -X POST https://api.github.com/graphql \
            -d "{\"query\": \"{ user(login: \\\"$USERNAME\\\") { contributionsCollection { contributionCalendar { totalContributions } } } }\"}" \
            | python3 -c "import sys,json; d=json.load(sys.stdin); print(d['data']['user']['contributionsCollection']['contributionCalendar']['totalContributions'])")

          # Also fetch all-time total from contribution years list
          ALL_TIME=$(curl -s -H "Authorization: Bearer $GH_TOKEN" \
            -H "Content-Type: application/json" \
            -X POST https://api.github.com/graphql \
            -d "{\"query\": \"{ user(login: \\\"$USERNAME\\\") { contributionsCollection { contributionYears } } }\"}" \
            | python3 -c "
import sys, json, subprocess, os

d = json.load(sys.stdin)
years = d['data']['user']['contributionsCollection']['contributionYears']
token = os.environ['GH_TOKEN']
username = os.environ['USERNAME']
total = 0
import urllib.request

for y in years:
    from_dt = f'{y}-01-01T00:00:00Z'
    to_dt   = f'{y}-12-31T23:59:59Z'
    query = '{\"query\": \"{ user(login: \\\"%s\\\") { contributionsCollection(from: \\\"%s\\\" to: \\\"%s\\\") { contributionCalendar { totalContributions } } } }\"}'
    body = ('{\"query\": \"{ user(login: \\\"%s\\\") { contributionsCollection(from: \\\"%s\\\" to: \\\"%s\\\") { contributionCalendar { totalContributions } } } }\"}'
            % (username, from_dt, to_dt)).encode()
    req = urllib.request.Request('https://api.github.com/graphql',
      data=body, headers={'Authorization': 'Bearer ' + token, 'Content-Type': 'application/json'})
    with urllib.request.urlopen(req) as r:
        resp = json.load(r)
    total += resp['data']['user']['contributionsCollection']['contributionCalendar']['totalContributions']

print(total)
")

          # ── Stars received across all repos ─────────────────────────────
          STARS=$(curl -s -H "Authorization: Bearer $GH_TOKEN" \
            "https://api.github.com/users/$USERNAME/repos?per_page=100&type=owner" \
            | python3 -c "import sys,json; repos=json.load(sys.stdin); print(sum(r['stargazers_count'] for r in repos))")

          # ── Write stats.json ────────────────────────────────────────────
          cat > stats.json <<JSON
          {
            "total_contributions": $ALL_TIME,
            "contributions_this_year": $CONTRIBUTIONS,
            "merged_prs": $MERGED_PRS,
            "repositories": $REPO_COUNT,
            "stars": $STARS,
            "updated_at": "$(date -u +"%Y-%m-%dT%H:%M:%SZ")"
          }
          JSON

          echo "Stats written:"
          cat stats.json

      - name: Commit updated stats.json
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add stats.json
          # only commit if something actually changed
          git diff --cached --quiet || git commit -m "chore: update github stats [skip ci]"
          git push
