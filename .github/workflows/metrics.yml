name: Generate Metrics SVG

on:
  schedule:
    - cron: "30 0 * * *"  # 30 min after stats workflow, so it can pick up fresh data
  workflow_dispatch:

jobs:
  github-metrics:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Generate main metrics SVG
        uses: lowlighter/metrics@latest
        with:
          # ── Auth & target ───────────────────────────────────────────────
          token: ${{ secrets.GITHUB_TOKEN }}
          user: hynko431
          filename: metrics.svg
          
          # ── Base sections ────────────────────────────────────────────────
          base: header, activity, community, repositories, achievements
          base_indepth: yes
          base_hireable: yes

          # ── Calendar / contribution heatmap ──────────────────────────────
          plugin_calendar: yes
          plugin_calendar_limit: 3       # show 3 years for impressive history

          # ── Achievements (very visual & impressive) ──────────────────────
          plugin_achievements: yes
          plugin_achievements_only: >-
            polyglot, stargazer, sponsor, developer, 
            opensource, maintainer
          plugin_achievements_threshold: C

          # ── Language breakdown (detailed) ────────────────────────────────
          plugin_languages: yes
          plugin_languages_details: bytes-size, percentage, lines
          plugin_languages_limit: 12
          plugin_languages_colors: github
          plugin_languages_ignored: >-
            html, css, scss, less, makefile, cmake,
            dockerfile, shell, batchfile, json, yaml, xml

          # ── Activity feed (impressive recent work) ──────────────────────
          plugin_activity: yes
          plugin_activity_limit: 8
          plugin_activity_days: 60
          plugin_activity_filter: >-
            push, pull_request, issue, review, release, commit

          # ── Lines of code changed ────────────────────────────────────────
          plugin_lines: no

          # ── Notable contributions (open source) ──────────────────────────
          plugin_notable: yes
          plugin_notable_from: organization

          # ── Topics / Skills visualization ────────────────────────────────
          plugin_topics: yes
          plugin_topics_limit: 12

          # ── Repositories (most interesting) ──────────────────────────────
          plugin_repositories: yes
          plugin_repositories_featured: yes

          # ── Traffic (if available) ──────────────────────────────────────
          plugin_traffic: no

          # ── Visual theme (modern & attractive) ──────────────────────────
          config_theme: github
          config_timezone: Asia/Kolkata
          config_display: large
          config_animations: yes
          config_padding: 6, 8
          
      # The action commits metrics.svg automatically; no separate step needed.
