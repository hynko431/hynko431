name: Generate Metrics SVG

on:
  schedule:
    - cron: "30 0 * * *"  # 30 min after stats workflow, so it can pick up fresh data
  workflow_dispatch:

jobs:
  github-metrics:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Generate main metrics SVG
        uses: lowlighter/metrics@latest
        with:
          # ── Auth & target ───────────────────────────────────────────────
          token: ${{ secrets.GITHUB_TOKEN }}
          user: hynko431
          filename: metrics.svg
          
          # ── Base sections ────────────────────────────────────────────────
          base: header, achievements
          base_indepth: yes

          # ── Achievements with ratings ────────────────────────────────────
          plugin_achievements: yes
          plugin_achievements_only: >
            polyglot, stargazer, developer, 
            opensource, maintainer, contributor
          plugin_achievements_threshold: C

          # ── Statistics / Summary ─────────────────────────────────────────
          plugin_summary: yes
          plugin_summary_size: large

          # ── Introduction ─────────────────────────────────────────────────
          plugin_introduction: yes
          plugin_introduction_title: yes

          # ── Lines (Code contributions) ───────────────────────────────────
          plugin_lines: yes
          plugin_lines_sections: repositories, history
          plugin_lines_history_limit: 1

          # ── Calendar / contribution heatmap ──────────────────────────────
          plugin_isocalendar: yes
          plugin_isocalendar_duration: full-year

          # ── Repositories (featured) ──────────────────────────────────────
          plugin_repositories: yes
          plugin_repositories_featured: yes
          plugin_repositories_starred: yes
          plugin_repositories_pinned: 6

          # ── Language breakdown (detailed) ────────────────────────────────
          plugin_languages: yes
          plugin_languages_details: bytes-size, percentage, lines
          plugin_languages_limit: 8
          plugin_languages_colors: github
          plugin_languages_ignored: >
            html, css, scss, less, makefile, cmake,
            dockerfile, shell, batchfile, json, yaml, xml

          # ── Activity feed ────────────────────────────────────────────────
          plugin_activity: yes
          plugin_activity_limit: 5
          plugin_activity_days: 30

          # ── Visual theme & layout ────────────────────────────────────────
          config_theme: github
          config_timezone: Asia/Kolkata
          config_display: large
          config_animations: yes
          config_padding: 8, 10
          config_order: header, achievements, summary, introduction, languages, repositories, isocalendar, lines, activity